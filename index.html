<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento Storymaker - Sarah Andreassa</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            font-family: 'Montserrat', sans-serif; 
            /* COR DO FUNDO DO SITE */
            background-color: #744434; 
            background-image: url('1.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .calc-container { 
            /* COR AONDE FICAM AS OPÇÕES */
            background-color: #915136; 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.4); 
            text-align: center; 
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo { 
            max-width: 324px; 
            width: 100%; 
            height: auto; 
            margin-bottom: 25px; 
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.2));
        }
        
        .field-group { 
            margin-bottom: 18px; 
            text-align: left; 
        }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: bold; 
            font-size: 11px; 
            /* COR DA LETRA QUE COMBINA */
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        select, input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255, 255, 255, 0.9); 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 600; 
            box-sizing: border-box; 
            color: #333; 
            outline: none;
        }
        
        .flex-row { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 18px; 
        }
        
        .flex-row div { flex: 1; }
        
        input[type="range"] { 
            width: 100%; 
            accent-color: #ffffff; 
            cursor: pointer; 
        }

        #containerFormatoVideo {
            background: rgba(0, 0, 0, 0.15);
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px dashed rgba(255,255,255,0.3);
        }
        
        .resumo-box { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 25px; 
            text-align: left; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .resumo-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            margin-bottom: 10px; 
            color: #F5E6E0; /* Bege claro para contraste suave */
        }

        .total-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 15px;
        }
        
        .total-valor { 
            font-size: 38px; 
            font-weight: 700; 
            color: #ffffff; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3); 
            margin: 10px 0 25px 0;
            text-align: center;
        }
        
        .btn-whatsapp { 
            background-color: #25d366; 
            color: white; 
            text-decoration: none; 
            padding: 18px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 12px; 
            transition: 0.3s; 
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            box-sizing: border-box;
            font-size: 15px;
        }
        
        .btn-whatsapp:hover { 
            background-color: #1eb954; 
            transform: translateY(-3px);
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="calc-container">
    <img src="2.png" alt="Sarah Andreassa Storymaker" class="logo">
    
    <div class="field-group">
        <label>Local de Atendimento</label>
        <select id="cidade" onchange="calcular()">
            <option value="0">Campo Largo (Sede)</option>
            <option value="35">Curitiba</option>
            <option value="25">São José dos Pinhais</option>
            <option value="45">Ponta Grossa</option>
            <option value="50">Londrina</option>
            <option value="50">Maringá</option>
        </select>
    </div>

    <div class="field-group">
        <label>Tipo de Evento</label>
        <select id="servico" onchange="toggleOutros()">
            <option value="1.00">Outros</option>
            <option value="1.10">Casamento</option>
            <option value="1.05">Chá Revelação</option>
            <option value="1.01">Aniversário</option>
            <option value="1.01">Festas</option>
        </select>
        <input type="text" id="outroServico" class="hidden" placeholder="Qual o tipo?" style="margin-top:8px;" oninput="calcular()">
    </div>

    <div class="flex-row">
        <div><label>Fotos</label><input type="number" id="qtdF" value="0" min="0" oninput="calcular()"></div>
        <div><label>Vídeos</label><input type="number" id="qtdV" value="0" min="0" oninput="calcular()"></div>
        <div><label>Stories</label><input type="number" id="qtdS" value="0" min="0" oninput="calcular()"></div>
    </div>

    <div id="containerFormatoVideo" class="field-group hidden">
        <label>Formato de Entrega</label>
        <select id="formatoVideo" onchange="calcular()">
            <option value="completo">Vídeos Completos (R$ 35,00)</option>
            <option value="takes">Apenas Takes (R$ 3,00 por take)</option>
        </select>
    </div>

    <div class="field-group">
        <label>Tempo de Cobertura: <span id="hLab" style="color:#ffffff">1</span>h</label>
        <input type="range" id="horas" min="1" max="10" value="1" oninput="updateH()">
    </div>

    <div class="field-group">
        <label>Prioridade de Entrega</label>
        <select id="prioridade" onchange="calcular()">
            <option value="1">Normal (7 dias)</option>
            <option value="1.15">Rápida (3 dias)</option>
            <option value="1.30">Urgente (Imediata)</option>
        </select>
    </div>

    <div class="resumo-box">
        <div id="resumoTexto"></div>
        <div class="total-area">
            <div style="font-size: 10px; color: #ffffff; font-weight: bold; text-transform: uppercase; opacity: 0.8;">Investimento Estimado</div>
            <div class="total-valor" id="total">R$ 0,00</div>
            <a id="btnWhats" href="#" target="_blank" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Solicitar Data com Sarah
            </a>
        </div>
    </div>
</div>

<script>
    const meuNumero = "554197432940";

    function toggleOutros() {
        const s = document.getElementById('servico');
        document.getElementById('outroServico').classList.toggle('hidden', s.options[s.selectedIndex].text !== 'Outros');
        calcular();
    }

    function updateH() {
        document.getElementById('hLab').innerText = document.getElementById('horas').value;
        calcular();
    }

    function calcular() {
        const pF = 7.5;   
        const pV = 35;    
        const pTake = 3;  
        const pS = 15;    
        const pH = 50;    

        const cidade = parseFloat(document.getElementById('cidade').value) || 0;
        const f = parseInt(document.getElementById('qtdF').value) || 0;
        const v = parseInt(document.getElementById('qtdV').value) || 0;
        const s = parseInt(document.getElementById('qtdS').value) || 0;
        const h = parseInt(document.getElementById('horas').value) || 1;
        const taxaE = parseFloat(document.getElementById('servico').value);
        const prio = parseFloat(document.getElementById('prioridade').value);
        const formatoV = document.getElementById('formatoVideo').value;

        const containerV = document.getElementById('containerFormatoVideo');
        if (v > 0) {
            containerV.classList.remove('hidden');
        } else {
            containerV.classList.add('hidden');
        }

        let nomeS = document.getElementById('servico').options[document.getElementById('servico').selectedIndex].text;
        if(nomeS === 'Outros') nomeS = document.getElementById('outroServico').value || 'Personalizado';

        let custoVideo;
        if (v > 0 && formatoV === 'takes') {
            custoVideo = v * pTake; 
        } else {
            custoVideo = v * pV * taxaE * prio; 
        }

        const baseCalculoComTaxas = ((f * pF) + (h * pH) + cidade) * taxaE * prio;
        const totalFinal = baseCalculoComTaxas + custoVideo + (s * pS);

        const valorFormatado = totalFinal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        let formatoMsg = (v > 0) ? (formatoV === 'takes' ? ' (Takes)' : ' (Editados)') : '';

        document.getElementById('resumoTexto').innerHTML = `
            <div class="resumo-item"><span>Serviço:</span> <span>${nomeS}</span></div>
            <div class="resumo-item"><span>Mídias:</span> <span>${f}F / ${v}V${formatoMsg} / ${s}S</span></div>
            <div class="resumo-item"><span>Tempo:</span> <span>${h} horas</span></div>
        `;
        document.getElementById('total').innerText = valorFormatado;

        const mensagem = `Olá Sarah! Fiz um orçamento na sua calculadora:%0A%0A` +
                         `*Serviço:* ${nomeS}%0A` +
                         `*Entregas:* ${f} fotos, ${v} vídeos${formatoMsg} e ${s} stories%0A` +
                         `*Tempo:* ${h} horas%0A` +
                         `*Valor Total:* ${valorFormatado}%0A%0A` +
                         `Podemos fechar?`;

        document.getElementById('btnWhats').href = `https://wa.me/${meuNumero}?text=${mensagem}`;
    }

    window.onload = calcular;
</script>

</body>
</html>
